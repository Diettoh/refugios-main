databases:
  - name: refugios-db
    plan: free # Puedes cambiarlo a 'starter' si necesitas más potencia
    databaseName: refugios
    user: refugios_user

services:
  - type: web
    name: refugios-mvp
    runtime: docker
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: refugios-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
